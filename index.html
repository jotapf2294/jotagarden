<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JotaGarden OS</title>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <meta name="theme-color" content="#000000">
</head>
<body class="dark-mode">

    <header class="app-header glass-panel">
        <h1>🌱 JotaGarden</h1>
        <div class="search-bar">
            <i class="fa-solid fa-search"></i>
            <input type="text" id="global-search" placeholder="Pesquisar Horta ou Wiki...">
        </div>
    </header>

    <main id="app-content">
        
        <section id="view-dashboard" class="view active fade-in">
            <h2>Dashboard</h2>
            <div class="glass-card moon-card">
                <h3>Fase da Lua</h3>
                <div id="moon-phase-display" class="moon-icon">🌑</div>
                <p id="moon-phase-text">Nova</p>
            </div>
            <div class="glass-card stats-card">
                <h3>Estatísticas da Horta</h3>
                <ul id="stats-list">
                    </ul>
            </div>
        </section>

        <section id="view-garden" class="view">
            <div class="view-header">
                <h2>A Minha Horta</h2>
                <button class="btn-primary" id="btn-add-zone">+ Nova Zona</button>
            </div>
            <div id="zones-container">
                </div>
        </section>

        <section id="view-wiki" class="view">
            <div class="view-header">
                <h2>Wiki de Espécies</h2>
                <button class="btn-primary" id="btn-add-species">+ Nova Espécie</button>
            </div>
            <div id="species-container" class="grid-container">
                </div>
        </section>

        <section id="view-diary" class="view">
            <div class="view-header">
                <h2>Diário</h2>
                <button class="btn-primary" id="btn-add-diary">+ Novo Registo</button>
            </div>
            <div id="diary-container" class="timeline">
                </div>
        </section>

        <section id="view-config" class="view">
            <h2>Configurações</h2>
            <div class="glass-card">
                <h3>Aparência</h3>
                <button class="btn-secondary" id="btn-toggle-theme"><i class="fa-solid fa-moon"></i> Alternar Dark/Light Mode</button>
            </div>
            <div class="glass-card">
                <h3>Dados (Backup/Restore)</h3>
                <button class="btn-secondary" id="btn-backup"><i class="fa-solid fa-download"></i> Exportar Dados (JSON)</button>
                <div class="mt-10">
                    <input type="file" id="file-restore" accept=".json" style="display: none;">
                    <button class="btn-danger" id="btn-restore" onclick="document.getElementById('file-restore').click()"><i class="fa-solid fa-upload"></i> Importar Dados (JSON)</button>
                </div>
            </div>
        </section>
    </main>

    <nav class="bottom-dock glass-panel">
        <a href="#" class="dock-item active" data-target="view-dashboard">
            <i class="fa-solid fa-house"></i><span>Início</span>
        </a>
        <a href="#" class="dock-item" data-target="view-garden">
            <i class="fa-solid fa-leaf"></i><span>Horta</span>
        </a>
        <a href="#" class="dock-item" data-target="view-wiki">
            <i class="fa-solid fa-book"></i><span>Wiki</span>
        </a>
        <a href="#" class="dock-item" data-target="view-diary">
            <i class="fa-solid fa-book-journal-whills"></i><span>Diário</span>
        </a>
        <a href="#" class="dock-item" data-target="view-config">
            <i class="fa-solid fa-gear"></i><span>Config</span>
        </a>
    </nav>

    <div id="modal-overlay" class="modal-overlay">
        <div id="modal-content" class="modal-content glass-card">
            </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
