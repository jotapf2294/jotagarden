<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Doce Gestão - Babe's Bakery</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="app-container">
        <aside class="sidebar desktop-nav">
            <div class="sidebar-brand">🧁 Doce Gestão</div>
            <nav class="nav-list">
                <button class="nav-item active" data-target="dashboard">
                    <span class="ico">📊</span> <span class="nav-label">Dashboard</span>
                </button>
                <button class="nav-item" data-target="receitas">
                    <span class="ico">📖</span> <span class="nav-label">Receitas</span>
                </button>
                <button class="nav-item" data-target="agenda">
                    <span class="ico">📅</span> <span class="nav-label">Agenda</span>
                </button>
                <button class="nav-item" data-target="gestao">
                    <span class="ico">⚙️</span> <span class="nav-label">Gestão</span>
                </button>
            </nav>
        </aside>

        <div class="main-wrapper">
            <header class="app-header">
                <div class="app-header-content">
                    <h1>🧁 Doce Gestão</h1>
                </div>
            </header>

            <main id="app-main">
                <section id="tab-dashboard" class="tab-content active"></section>
                <section id="tab-receitas" class="tab-content"></section>
                <section id="tab-agenda" class="tab-content"></section>
                <section id="tab-gestao" class="tab-content"></section>
            </main>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-btn active" data-target="dashboard">
            <span class="ico">📊</span><span>Dash</span>
        </button>
        <button class="nav-btn" data-target="receitas">
            <span class="ico">📖</span><span>Receitas</span>
        </button>
        <button class="nav-btn" data-target="agenda">
            <span class="ico">📅</span><span>Agenda</span>
        </button>
        <button class="nav-btn" data-target="gestao">
            <span class="ico">⚙️</span><span>Gestão</span>
        </button>
    </nav>

    <script type="module" src="js/app.js"></script>
    
    <div id="print-area"></div>
</body>
</html>
