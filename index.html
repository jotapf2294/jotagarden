<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JotaGarden OS</title>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            /* GitHub Dark Mode Palette */
            --bg-canvas: #0d1117;
            --bg-surface: #161b22;
            --border-default: #30363d;
            --text-primary: #c9d1d9;
            --text-secondary: #8b949e;
            --accent-green: #238636;
            --accent-green-hover: #2ea043;
            --accent-blue: #58a6ff;
            --danger: #da3633;
            --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        }

        body.light-mode {
            --bg-canvas: #ffffff;
            --bg-surface: #f6f8fa;
            --border-default: #d0d7de;
            --text-primary: #24292f;
            --text-secondary: #57606a;
            --accent-green: #1a7f37;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; background-color: var(--bg-canvas); color: var(--text-primary);
            font-family: var(--font-main); overflow: hidden; transition: 0.2s;
        }

        /* --- Layout --- */
        header {
            position: fixed; top: 0; width: 100%; height: 65px;
            background: var(--bg-surface); border-bottom: 1px solid var(--border-default);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; z-index: 1000;
        }

        .search-container {
            flex: 1; margin: 0 15px; max-width: 400px; position: relative;
        }

        .search-container input {
            width: 100%; background: var(--bg-canvas); border: 1px solid var(--border-default);
            border-radius: 6px; padding: 6px 12px 6px 35px; color: var(--text-primary);
        }

        .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); }

        main {
            height: 100vh; padding: 80px 15px 90px 15px;
            overflow-y: auto; display: flex; flex-direction: column; align-items: center;
        }

        .view-section { width: 100%; max-width: 800px; display: none; animation: fadeIn 0.2s ease-in; }
        .view-section.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* --- Cards --- */
        .gh-card {
            background: var(--bg-surface); border: 1px solid var(--border-default);
            border-radius: 6px; padding: 16px; margin-bottom: 16px;
        }

        .gh-card h3 { margin: 0 0 10px 0; font-size: 1.1rem; display: flex; align-items: center; gap: 8px; }

        /* --- UI Elements --- */
        .btn {
            border: 1px solid var(--border-default); border-radius: 6px; padding: 5px 16px;
            font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; gap: 8px;
            background: var(--bg-surface); color: var(--text-primary); transition: 0.1s;
        }
        .btn-primary { background: var(--accent-green); color: white; border: none; }
        .btn-primary:hover { background: var(--accent-green-hover); }
        .btn-danger { color: var(--danger); }
        .btn-danger:hover { background: var(--danger); color: white; }

        .badge {
            font-size: 12px; padding: 2px 8px; border-radius: 20px;
            border: 1px solid var(--border-default); color: var(--text-secondary);
        }

        input, select, textarea {
            width: 100%; background: var(--bg-canvas); border: 1px solid var(--border-default);
            border-radius: 6px; padding: 8px; color: var(--text-primary); margin: 8px 0;
        }

        /* --- Nav Dock --- */
        .dock {
            position: fixed; bottom: 0; width: 100%; height: 70px;
            background: var(--bg-surface); border-top: 1px solid var(--border-default);
            display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }

        .dock-item {
            display: flex; flex-direction: column; align-items: center;
            color: var(--text-secondary); text-decoration: none; font-size: 11px; gap: 4px; flex: 1;
        }

        .dock-item.active { color: var(--accent-blue); }
        .dock-item i { width: 20px; height: 20px; }

        /* --- Modal --- */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 2000;
        }
        .modal-content {
            width: 95%; max-width: 500px; background: var(--bg-surface);
            border: 1px solid var(--border-default); border-radius: 12px; padding: 20px;
            max-height: 90vh; overflow-y: auto;
        }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .mt-10 { margin-top: 10px; }
        .text-muted { color: var(--text-secondary); font-size: 0.9rem; }
    </style>
</head>
<body>

    <header>
        <div style="font-weight: 600; font-size: 1.2rem;">JotaGarden <span style="font-weight: 300; opacity: 0.6;">OS</span></div>
        <div class="search-container">
            <i data-lucide="search" class="search-icon"></i>
            <input type="text" id="global-search" placeholder="Filter..." oninput="ui.handleSearch(this.value)">
        </div>
    </header>

    <main>
        <section id="view-home" class="view-section active">
            <div class="gh-card">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <div id="home-date" class="text-muted"></div>
                        <h2 id="moon-phase-name" style="margin: 5px 0;">New Moon</h2>
                    </div>
                    <div id="moon-icon" style="font-size: 2.5rem;">🌑</div>
                </div>
            </div>

            <h3><i data-lucide="bell"></i> Attention Needed</h3>
            <div id="home-alerts"></div>

            <h3 class="mt-10"><i data-lucide="sparkles"></i> Seasonal Suggestions</h3>
            <div id="home-suggestions" class="grid-2"></div>

            <h3 class="mt-10"><i data-lucide="book-open"></i> Note Highlights</h3>
            <div id="home-notes"></div>
        </section>

        <section id="view-garden" class="view-section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h2>Garden Plots</h2>
                <button class="btn btn-primary" onclick="ui.openPlantModal()"><i data-lucide="plus"></i> Plant</button>
            </div>
            <div id="garden-list"></div>
        </section>

        <section id="view-wiki" class="view-section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h2>Species Wiki</h2>
                <button class="btn btn-primary" onclick="ui.openSpeciesModal()"><i data-lucide="plus"></i> Species</button>
            </div>
            <div id="wiki-list"></div>
        </section>

        <section id="view-book" class="view-section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h2>The Book</h2>
                <button class="btn btn-primary" onclick="ui.openNoteModal()"><i data-lucide="plus"></i> Note</button>
            </div>
            <div id="book-list"></div>
        </section>

        <section id="view-config" class="view-section">
            <h2>Settings</h2>
            <div class="gh-card">
                <h3>Appearance</h3>
                <button class="btn" style="width: 100%" onclick="ui.toggleTheme()"><i data-lucide="moon"></i> Toggle Dark/Light Mode</button>
            </div>
            <div class="gh-card">
                <h3>Management Zones</h3>
                <div id="zone-config-list" style="margin-bottom: 10px;"></div>
                <div style="display: flex; gap: 5px;">
                    <input type="text" id="new-zone-input" placeholder="Zone name (e.g. Greenhouse)">
                    <button class="btn btn-primary" onclick="ui.addZone()">Add</button>
                </div>
            </div>
            <div class="gh-card">
                <h3>Data Backup</h3>
                <div class="grid-2">
                    <button class="btn" onclick="logic.exportData()"><i data-lucide="download"></i> Export JSON</button>
                    <button class="btn" onclick="document.getElementById('import-file').click()"><i data-lucide="upload"></i> Import JSON</button>
                </div>
                <input type="file" id="import-file" style="display:none" onchange="logic.importData(this)">
            </div>
        </section>
    </main>

    <nav class="dock">
        <a href="#" class="dock-item active" onclick="ui.navigate('view-home', this)"><i data-lucide="home"></i>Home</a>
        <a href="#" class="dock-item" onclick="ui.navigate('view-garden', this)"><i data-lucide="leaf"></i>Garden</a>
        <a href="#" class="dock-item" onclick="ui.navigate('view-wiki', this)"><i data-lucide="database"></i>Wiki</a>
        <a href="#" class="dock-item" onclick="ui.navigate('view-book', this)"><i data-lucide="book"></i>Book</a>
        <a href="#" class="dock-item" onclick="ui.navigate('view-config', this)"><i data-lucide="settings"></i>Config</a>
    </nav>

    <div id="modal" class="modal" onclick="if(event.target === this) ui.closeModal()">
        <div class="modal-content" id="modal-body"></div>
    </div>

    <script>
        // --- DATABASE INIT ---
        const db = new Dexie('JotaGardenDB');
        db.version(1).stores({
            zones: '++id, name',
            species: '++id, name, category, months',
            plants: '++id, zoneId, speciesId, plantDate, lastWatered',
            book: '++id, title, category, timestamp'
        });

        // --- LOGIC ---
        const logic = {
            async getMoonPhase() {
                const lp = 2551443; 
                const now = new Date();
                const new_moon = new Date(1970, 0, 7, 20, 35, 0);
                const phase = ((now.getTime() - new_moon.getTime()) % lp) / lp;
                const b = Math.floor(phase * 8);
                const phases = [
                    {n: 'New Moon', i: '🌑'}, {n: 'Waxing Crescent', i: '🌒'}, {n: 'First Quarter', i: '🌓'}, {n: 'Waxing Gibbous', i: '🌔'},
                    {n: 'Full Moon', i: '🌕'}, {n: 'Waning Gibbous', i: '🌖'}, {n: 'Last Quarter', i: '🌗'}, {n: 'Waning Crescent', i: '🌘'}
                ];
                return phases[b >= 8 ? 0 : b];
            },

            daysSince(date) {
                const diff = new Date().getTime() - new Date(date).getTime();
                return Math.floor(diff / (1000 * 3600 * 24));
            },

            async exportData() {
                const data = {
                    zones: await db.zones.toArray(),
                    species: await db.species.toArray(),
                    plants: await db.plants.toArray(),
                    book: await db.book.toArray()
                };
                const blob = new Blob([JSON.stringify(data)], {type: 'application/json'});
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `jotagarden_backup_${new Date().toISOString().split('T')[0]}.json`;
                a.click();
            },

            async importData(input) {
                const file = input.files[0];
                const reader = new FileReader();
                reader.onload = async (e) => {
                    const data = JSON.parse(e.target.result);
                    await db.transaction('rw', [db.zones, db.species, db.plants, db.book], async () => {
                        await db.zones.clear(); await db.species.clear();
                        await db.plants.clear(); await db.book.clear();
                        await db.zones.bulkAdd(data.zones);
                        await db.species.bulkAdd(data.species);
                        await db.plants.bulkAdd(data.plants);
                        await db.book.bulkAdd(data.book);
                    });
                    location.reload();
                };
                reader.readAsText(file);
            }
        };

        // --- UI ---
        const ui = {
            currentTab: 'view-home',

            init() {
                lucide.createIcons();
                this.renderHome();
                document.getElementById('home-date').innerText = new Date().toLocaleDateString(undefined, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            },

            navigate(tabId, el) {
                document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
                document.querySelectorAll('.dock-item').forEach(i => i.classList.remove('active'));
                document.getElementById(tabId).classList.add('active');
                el.classList.add('active');
                this.currentTab = tabId;
                this.refreshCurrentTab();
            },

            refreshCurrentTab() {
                if(this.currentTab === 'view-home') this.renderHome();
                if(this.currentTab === 'view-garden') this.renderGarden();
                if(this.currentTab === 'view-wiki') this.renderWiki();
                if(this.currentTab === 'view-book') this.renderBook();
                if(this.currentTab === 'view-config') this.renderConfig();
            },

            handleSearch(val) {
                const filter = val.toLowerCase();
                const cards = document.querySelectorAll('.gh-card');
                cards.forEach(c => {
                    c.style.display = c.innerText.toLowerCase().includes(filter) ? 'block' : 'none';
                });
            },

            showModal(html) {
                const m = document.getElementById('modal');
                document.getElementById('modal-body').innerHTML = html;
                m.style.display = 'flex';
                lucide.createIcons();
            },

            closeModal() { document.getElementById('modal').style.display = 'none'; },

            // --- Home Render ---
            async renderHome() {
                const moon = await logic.getMoonPhase();
                document.getElementById('moon-icon').innerText = moon.i;
                document.getElementById('moon-phase-name').innerText = moon.n;

                // Alerts (Watering)
                const plants = await db.plants.toArray();
                const needsWater = plants.filter(p => !p.lastWatered || logic.daysSince(p.lastWatered) >= 2);
                document.getElementById('home-alerts').innerHTML = needsWater.length > 0 ? `
                    <div class="gh-card" style="border-left: 4px solid var(--accent-green)">
                        ${needsWater.length} plants might be thirsty. Check your garden!
                    </div>` : '<p class="text-muted">All plants are hydrated.</p>';

                // Seasonal Suggestions
                const month = new Date().getMonth() + 1;
                const species = await db.species.toArray();
                const sug = species.filter(s => s.months?.split(',').includes(month.toString()));
                document.getElementById('home-suggestions').innerHTML = sug.map(s => `
                    <div class="gh-card" style="margin-bottom:0; text-align:center;">
                        <div style="font-weight:600; color:var(--accent-green)">${s.name}</div>
                        <small class="text-muted">${s.category}</small>
                    </div>
                `).join('') || '<p class="text-muted">No specific suggestions for this month.</p>';

                // Note Highlights
                const notes = await db.book.orderBy('id').reverse().limit(2).toArray();
                document.getElementById('home-notes').innerHTML = notes.map(n => `
                    <div class="gh-card">
                        <strong>${n.title}</strong><br><small class="text-muted">${n.category}</small>
                    </div>
                `).join('') || '<p class="text-muted">No notes yet.</p>';
            },

            // --- Wiki Render ---
            async renderWiki() {
                const list = await db.species.toArray();
                document.getElementById('wiki-list').innerHTML = list.map(s => `
                    <div class="gh-card">
                        <div style="display:flex; justify-content:space-between">
                            <h3>${s.name} <span class="badge">${s.category}</span></h3>
                            <button class="btn" onclick="ui.openSpeciesModal(${s.id})"><i data-lucide="edit-3"></i></button>
                        </div>
                        <div class="grid-2 text-muted" style="font-size:0.8rem; margin:10px 0;">
                            <div>🌡️ ${s.temp}°C</div>
                            <div>⏱️ ${s.harvest} days</div>
                            <div style="grid-column: span 2">📅 Months: ${s.months || 'All'}</div>
                        </div>
                        <div style="white-space:pre-wrap; font-size:0.9rem; margin-top:10px; padding-top:10px; border-top:1px solid var(--border-default)">${s.notes || ''}</div>
                    </div>
                `).join('');
                lucide.createIcons();
            },

            async openSpeciesModal(id = null) {
                const s = id ? await db.species.get(id) : null;
                this.showModal(`
                    <h3>${id ? 'Edit' : 'New'} Species</h3>
                    <input type="text" id="s-name" placeholder="Name" value="${s?.name || ''}">
                    <select id="s-cat">
                        <option value="Leafy">Leafy</option><option value="Fruit">Fruit</option>
                        <option value="Root">Root</option><option value="Herbs">Herbs</option>
                    </select>
                    <div class="grid-2">
                        <input type="number" id="s-harvest" placeholder="Harvest (days)" value="${s?.harvest || ''}">
                        <input type="text" id="s-temp" placeholder="Temp (°C)" value="${s?.temp || ''}">
                    </div>
                    <input type="text" id="s-months" placeholder="Months (1,2,3...)" value="${s?.months || ''}">
                    <textarea id="s-notes" rows="4" placeholder="Cultivation notes...">${s?.notes || ''}</textarea>
                    <button class="btn btn-primary" style="width:100%" onclick="ui.saveSpecies(${id})">Save Species</button>
                    ${id ? `<button class="btn btn-danger mt-10" style="width:100%" onclick="ui.deleteItem('species', ${id}, 'renderWiki')">Delete</button>` : ''}
                `);
            },

            async saveSpecies(id) {
                const data = {
                    name: document.getElementById('s-name').value,
                    category: document.getElementById('s-cat').value,
                    harvest: document.getElementById('s-harvest').value,
                    temp: document.getElementById('s-temp').value,
                    months: document.getElementById('s-months').value,
                    notes: document.getElementById('s-notes').value
                };
                id ? await db.species.update(id, data) : await db.species.add(data);
                this.closeModal(); this.renderWiki();
            },

            // --- Garden Render ---
            async renderGarden() {
                const plants = await db.plants.toArray();
                const species = await db.species.toArray();
                const zones = await db.zones.toArray();
                
                document.getElementById('garden-list').innerHTML = zones.map(z => {
                    const zPlants = plants.filter(p => p.zoneId == z.id);
                    return `
                        <div class="gh-card">
                            <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border-default); padding-bottom:8px; margin-bottom:10px;">
                                <h3 style="margin:0">${z.name}</h3>
                                <button class="btn" onclick="ui.waterZone(${z.id})"><i data-lucide="droplets"></i> Water All</button>
                            </div>
                            ${zPlants.map(p => {
                                const sp = species.find(s => s.id == p.speciesId);
                                return `
                                    <div style="padding:10px 0; border-bottom: 1px solid var(--border-default); last-child: border-none;">
                                        <div style="display:flex; justify-content:space-between">
                                            <strong>${sp?.name || 'Unknown'}</strong>
                                            <div>
                                                <button class="btn" onclick="ui.waterPlant(${p.id})"><i data-lucide="droplet"></i></button>
                                                <button class="btn" onclick="ui.harvestPlant(${p.id}, '${sp?.name}')"><i data-lucide="scissors"></i></button>
                                            </div>
                                        </div>
                                        <div class="text-muted" style="font-size:0.8rem">
                                            Planted ${logic.daysSince(p.plantDate)} days ago | 
                                            Last watered: ${p.lastWatered ? logic.daysSince(p.lastWatered) + 'd ago' : 'Never'}
                                        </div>
                                    </div>
                                `;
                            }).join('') || '<p class="text-muted">Empty zone.</p>'}
                        </div>
                    `;
                }).join('');
                lucide.createIcons();
            },

            async openPlantModal() {
                const zones = await db.zones.toArray();
                const species = await db.species.toArray();
                this.showModal(`
                    <h3>New Plant</h3>
                    <label>Zone</label>
                    <select id="p-zone">${zones.map(z => `<option value="${z.id}">${z.name}</option>`).join('')}</select>
                    <label>Species</label>
                    <select id="p-species">${species.map(s => `<option value="${s.id}">${s.name}</option>`).join('')}</select>
                    <input type="date" id="p-date" value="${new Date().toISOString().split('T')[0]}">
                    <button class="btn btn-primary" style="width:100%" onclick="ui.savePlant()">Plant Now</button>
                `);
            },

            async savePlant() {
                await db.plants.add({
                    zoneId: parseInt(document.getElementById('p-zone').value),
                    speciesId: parseInt(document.getElementById('p-species').value),
                    plantDate: document.getElementById('p-date').value,
                    lastWatered: null
                });
                this.closeModal(); this.renderGarden();
            },

            async waterPlant(id) { await db.plants.update(id, {lastWatered: new Date().getTime()}); this.renderGarden(); },
            async waterZone(zoneId) { 
                const pts = await db.plants.where('zoneId').equals(zoneId).toArray();
                for(let p of pts) await db.plants.update(p.id, {lastWatered: new Date().getTime()});
                this.renderGarden();
            },
            async harvestPlant(id, name) {
                if(confirm('Harvest and archive?')) {
                    const p = await db.plants.get(id);
                    await db.book.add({ title: `Harvested: ${name}`, category: 'Harvest', text: `Successful harvest after ${logic.daysSince(p.plantDate)} days.`, timestamp: new Date().toLocaleString() });
                    await db.plants.delete(id);
                    this.renderGarden();
                }
            },

            // --- Book Render ---
            async renderBook() {
                const entries = await db.book.orderBy('id').reverse().toArray();
                document.getElementById('book-list').innerHTML = entries.map(e => `
                    <div class="gh-card">
                        <div style="display:flex; justify-content:space-between">
                            <h3>${e.title} <span class="badge">${e.category}</span></h3>
                            <button class="btn" onclick="ui.openNoteModal(${e.id})"><i data-lucide="edit-3"></i></button>
                        </div>
                        <div class="text-muted" style="font-size:0.75rem; margin:5px 0;">${e.timestamp}</div>
                        <div style="white-space:pre-wrap; margin-top:10px;">${e.text}</div>
                    </div>
                `).join('');
                lucide.createIcons();
            },

            async openNoteModal(id = null) {
                const e = id ? await db.book.get(id) : null;
                this.showModal(`
                    <h3>${id ? 'Edit' : 'New'} Note</h3>
                    <input type="text" id="n-title" placeholder="Title" value="${e?.title || ''}">
                    <select id="n-cat">
                        <option value="General">General</option><option value="Fertilization">Fertilization</option>
                        <option value="Harvest">Harvest</option><option value="Observation">Observation</option>
                    </select>
                    <textarea id="n-text" rows="6" placeholder="Details...">${e?.text || ''}</textarea>
                    <button class="btn btn-primary" style="width:100%" onclick="ui.saveNote(${id})">Save Note</button>
                    ${id ? `<button class="btn btn-danger mt-10" style="width:100%" onclick="ui.deleteItem('book', ${id}, 'renderBook')">Delete</button>` : ''}
                `);
            },

            async saveNote(id) {
                const data = {
                    title: document.getElementById('n-title').value,
                    category: document.getElementById('n-cat').value,
                    text: document.getElementById('n-text').value,
                    timestamp: id ? (await db.book.get(id)).timestamp : new Date().toLocaleString()
                };
                id ? await db.book.update(id, data) : await db.book.add(data);
                this.closeModal(); this.renderBook();
            },

            // --- Config Render ---
            async renderConfig() {
                const zones = await db.zones.toArray();
                document.getElementById('zone-config-list').innerHTML = zones.map(z => `
                    <div style="display:flex; justify-content:space-between; align-items:center; padding:8px; border-bottom:1px solid var(--border-default)">
                        <span>${z.name}</span>
                        <button class="btn btn-danger" onclick="ui.deleteItem('zones', ${z.id}, 'renderConfig')"><i data-lucide="trash"></i></button>
                    </div>
                `).join('');
                lucide.createIcons();
            },

            async addZone() {
                const input = document.getElementById('new-zone-input');
                if(input.value) { await db.zones.add({name: input.value}); input.value = ''; this.renderConfig(); }
            },

            async deleteItem(table, id, callback) {
                if(confirm('Delete this item?')) {
                    await db[table].delete(id);
                    if(table === 'zones') await db.plants.where('zoneId').equals(id).delete();
                    this.closeModal();
                    this[callback]();
                }
            },

            toggleTheme() {
                document.body.classList.toggle('light-mode');
                localStorage.setItem('jg-theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
            }
        };

        window.onload = () => {
            if(localStorage.getItem('jg-theme') === 'light') document.body.classList.add('light-mode');
            ui.init();
        };
    </script>
</body>
</html>
