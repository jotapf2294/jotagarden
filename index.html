<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>JotaGarden OS</title>
    
    <!-- PWA Manifest (crie um ficheiro manifest.json ao lado) -->
    <link rel="manifest" href="manifest.json">
    
    <!-- Dexie.js via CDN (versão mais recente estável em 2026) -->
    <script src="https://cdn.jsdelivr.net/npm/dexie@4.0.8/dist/dexie.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- HEADER FIXO -->
    <header class="glass-header">
        <div class="header-content">
            <div class="logo">
                <span class="neon-text">🌱</span>
                <h1>JotaGarden OS</h1>
            </div>
            
            <!-- Pesquisa Global -->
            <div class="search-container">
                <input 
                    type="text" 
                    id="global-search" 
                    placeholder="🔎 Pesquisar na Horta ou Wiki..." 
                    autocomplete="off">
            </div>
            
            <div class="header-actions">
                <button id="btn-moon" class="icon-btn" title="Fase da Lua">
                    <span id="moon-icon" class="moon-emoji">🌕</span>
                </button>
            </div>
        </div>
    </header>

    <!-- CONTEÚDO PRINCIPAL -->
    <main id="main-content" class="main-content"></main>

    <!-- NAVEGAÇÃO INFERIOR FLUTUANTE (DOCK) -->
    <nav class="bottom-nav glass">
        <div class="nav-item active" data-section="home">
            <div class="nav-icon">🏠</div>
            <span class="nav-label">Início</span>
        </div>
        <div class="nav-item" data-section="horta">
            <div class="nav-icon">🌿</div>
            <span class="nav-label">Horta</span>
        </div>
        <div class="nav-item" data-section="wiki">
            <div class="nav-icon">📖</div>
            <span class="nav-label">Wiki</span>
        </div>
        <div class="nav-item" data-section="diario">
            <div class="nav-icon">📓</div>
            <span class="nav-label">Diário</span>
        </div>
        <div class="nav-item" data-section="config">
            <div class="nav-icon">⚙️</div>
            <span class="nav-label">Config</span>
        </div>
    </nav>

    <!-- MODAL ÚNICO (reutilizado por JS) -->
    <div id="modal" class="modal">
        <div class="modal-content glass" id="modal-inner">
            <!-- Conteúdo dinâmico inserido via JS -->
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
