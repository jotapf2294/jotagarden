<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>JotaGarden Ultra PRO</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/dexie@4.0.8/dist/dexie.min.js"></script>
    <style>
        :root {
            --p: #2e7d32; --p-light: rgba(46,125,50,0.1); --bg: #f4f7f4; 
            --card: #ffffff; --txt: #2c3e50; --shadow: 0 8px 20px rgba(0,0,0,0.05);
            --danger: #e53935; --warn: #ffa000; --accent: #795548;
        }
        body.dark { --bg: #121212; --card: #1e1e1e; --txt: #eceff1; --p: #81c784; --p-light: rgba(129,199,132,0.1); }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; margin: 0; background: var(--bg); 
            color: var(--txt); height: 100vh; display: flex; flex-direction: column; overflow: hidden; 
        }

        /* UI Shell */
        .header { background: var(--p); padding: 15px 15px 25px; border-radius: 0 0 30px 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        #globalSearch { 
            width: 100%; border: none; padding: 16px 20px; border-radius: 50px; 
            background: var(--card); color: var(--txt); box-shadow: var(--shadow);
            margin-top: env(safe-area-inset-top); font-size: 1rem;
        }

        .main-content { flex: 1; overflow-y: auto; padding: 15px 15px 120px; scroll-behavior: smooth; }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Cards & Elements */
        .card { background: var(--card); border-radius: 24px; padding: 18px; margin-bottom: 15px; box-shadow: var(--shadow); }
        .card-lunar { background: linear-gradient(135deg, #1a2a3a, #000) !important; color: white !important; display: flex; align-items: center; gap: 20px; }
        .card-lunar span { font-size: 3.5rem; line-height: 1; }
        
        /* Dica do Dia */
        .card-note { border-left: 5px solid #fbc02d; background: var(--p-light); }
        .line-clamp { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .btn-more { color: var(--p); font-weight: bold; cursor: pointer; font-size: 0.8rem; margin-top: 5px; display: inline-block; }

        /* Sugestões Carrossel */
        .sugestao-container { display: flex; overflow-x: auto; gap: 12px; padding: 5px 0 15px; scrollbar-width: none; }
        .sugestao-container::-webkit-scrollbar { display: none; }
        .card-sugestao { 
            min-width: 140px; background: var(--card); border: 1.5px solid var(--p-light); 
            border-radius: 20px; padding: 15px; text-align: center; flex-shrink: 0; transition: 0.2s;
        }
        .card-sugestao:active { transform: scale(0.95); background: var(--p-light); }

        /* Buttons */
        .btn-main { background: var(--p); color: white; border: none; padding: 15px; border-radius: 18px; font-weight: 800; width: 100%; cursor: pointer; }
        .btn-sec { background: #546e7a !important; }
        .btn-act { border: none; background: none; font-size: 1.4rem; padding: 5px; cursor: pointer; filter: grayscale(0.3); }
        .btn-act:hover { filter: grayscale(0); }

        /* Navbar */
        .nav-bar { 
            position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; 
            padding: 10px 5px calc(10px + env(safe-area-inset-bottom)); border-top: 1px solid rgba(0,0,0,0.05); 
            box-shadow: 0 -5px 20px rgba(0,0,0,0.03);
        }
        .nav-btn { flex: 1; border: none; background: none; color: #90a4ae; font-size: 0.7rem; font-weight: 600; text-align: center; }
        .nav-btn.active { color: var(--p); }
        .nav-btn i { display: block; font-size: 1.5rem; margin-bottom: 4px; font-style: normal; }

        /* Modals */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(5px); padding: 20px; }
        .modal-content { background: var(--card); border-radius: 30px; padding: 25px; width: 100%; max-width: 450px; max-height: 90vh; overflow-y: auto; }
        
        input, select, textarea { 
            width: 100%; padding: 14px; margin: 8px 0; border-radius: 15px; 
            border: 1px solid rgba(0,0,0,0.1); background: var(--bg); color: var(--txt); font-size: 1rem; 
        }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 10px 0; }
    </style>
</head>
<body class="dark"> <div class="header">
    <input type="text" id="globalSearch" placeholder="🔍 Procurar na JotaGarden..." oninput="ui.render()">
</div>

<main class="main-content">
    <section id="page-dash" class="page active"></section>

    <section id="page-horta" class="page">
        <div class="grid-2">
            <button class="btn-main" onclick="ui.openModal('modal-planta')">+ Plantar</button>
            <button class="btn-main btn-sec" onclick="ui.openModal('modal-historico')">📜 Histórico</button>
        </div>
        <div id="draw-horta"></div>
    </section>

    <section id="page-wiki" class="page">
        <button class="btn-main" style="margin-bottom:15px" onclick="ui.openModal('modal-wiki')">+ Adicionar Espécie</button>
        <div id="draw-wiki"></div>
    </section>

    <section id="page-book" class="page">
        <button class="btn-main" style="margin-bottom:15px" onclick="ui.openModal('modal-book')">+ Nova Nota</button>
        <div id="draw-book"></div>
    </section>

    <section id="page-config" class="page">
        <div class="card">
            <h3>🌍 Clima e Tema</h3>
            <label><small>Temperatura Média Atual (°C)</small></label>
            <div style="display:flex; gap:8px;">
                <input type="number" id="cfg-temp" placeholder="22" style="margin:0">
                <button class="btn-main" style="width:70px" onclick="logic.saveTemp()">OK</button>
            </div>
            <button class="btn-main btn-sec" style="margin-top:15px" onclick="logic.toggleTheme()">Alternar Dark/Light Mode</button>
        </div>
        <div class="card">
            <h3>📍 Zonas</h3>
            <div style="display:flex; gap:8px;">
                <input type="text" id="z-input" placeholder="Nova Zona..." style="margin:0">
                <button class="btn-main" style="width:70px" onclick="logic.addZona()">OK</button>
            </div>
            <div id="draw-zonas" style="margin-top:15px"></div>
        </div>
        <div class="card">
            <h3>📊 Estatísticas</h3>
            <div id="draw-stats"></div>
        </div>
        <div class="card">
    <h3>💾 Gestão de Dados</h3>
    <div class="grid-2">
        <button class="btn-main" style="background:#f39c12" onclick="logic.exportData()">💾 Exportar</button>
        <button class="btn-main btn-sec" onclick="document.getElementById('fileIn').click()">📥 Importar</button>
    </div>
    <input type="file" id="fileIn" style="display:none" onchange="logic.importData(event)">
</div>
    </section>
</main>

<div id="modal-plantar" class="modal">
    <div class="modal-content">
        <h3>🌱 Novo Plantio</h3>
        
        <input type="text" id="p-nome" placeholder="Nome (ex: Cherry 1)" class="input-form">
        
        <select id="p-especie" class="input-form">
            <option value="">Selecionar Espécie...</option>
        </select>
        
        <select id="p-zona" class="input-form">
            </select>
        
        <input type="date" id="p-data" class="input-form">
        
        <textarea id="p-nota" placeholder="Notas e observações..." class="input-form" style="height:80px"></textarea>
        
        <div class="grid-2">
            <button class="btn-main" onclick="logic.savePlantio()">Confirmar Plantio</button>
            <button class="btn-main btn-sec" onclick="ui.closeModal('modal-plantar')">Cancelar</button>
        </div>
    </div>

<div id="modal-wiki" class="modal">
    <div class="modal-content">
        <h3>📖 Info da Espécie</h3>
        
        <input type="text" id="w-especie" placeholder="Nome da Espécie" class="input-form">
        <select id="w-cat" class="input-form">
            <option value="Folhas">🥬 Folhas</option>
            <option value="Frutos">🍅 Frutos</option>
            <option value="Raízes">🥕 Raízes</option>
            <option value="Flores">🌸 Flores</option>
        </select>
        
        <div class="grid-2">
            <input type="number" id="w-tempo" placeholder="Dias até colheita" class="input-form">
            <input type="number" id="w-temp" placeholder="Temp. Ideal ºC" class="input-form">
        </div>

        <textarea id="w-info" placeholder="Notas técnicas (ex: Solo rico em azoto, rega moderada...)" class="input-form" style="height:80px; margin-top:10px;"></textarea>
        
        <div class="grid-2">
            <button class="btn-main" onclick="logic.saveWiki()">Guardar na Wiki</button>
            <button class="btn-main btn-sec" onclick="ui.closeModal('modal-wiki')">Fechar</button>
        </div>
    </div>

<div id="modal-book" class="modal"><div class="modal-content">
    <h3>📒 Nova Nota</h3>
    <input type="text" id="b-tit" placeholder="Título">
    <textarea id="b-txt" style="height:150px" placeholder="Conteúdo da nota..."></textarea>
    <button class="btn-main" onclick="logic.saveBook()">Guardar Nota</button>
    <button class="btn-main btn-sec" onclick="ui.closeModal('modal-book')" style="margin-top:10px">Fechar</button>
</div></div>

<div id="modal-historico" class="modal"><div class="modal-content">
    <h3>📜 Histórico de Sucesso</h3>
    <div id="draw-historico-lista"></div>
    <button class="btn-main btn-sec" onclick="ui.closeModal('modal-historico')" style="margin-top:15px">Voltar</button>
</div></div>

<nav class="nav-bar">
    <button class="nav-btn active" onclick="ui.nav('dash', this)"><i>🏠</i>Início</button>
    <button class="nav-btn" onclick="ui.nav('horta', this)"><i>🌱</i>Horta</button>
    <button class="nav-btn" onclick="ui.nav('wiki', this)"><i>📖</i>Wiki</button>
    <button class="nav-btn" onclick="ui.nav('book', this)"><i>📒</i>Livro</button>
    <button class="nav-btn" onclick="ui.nav('config', this)"><i>⚙️</i>Config</button>
</nav>

<script>
// --- DATABASE ---
const db = new Dexie("JotaGardenDB");
db.version(7).stores({
    plantas: '++id, variedade, zonaId, data, ultimaRega',
    wiki: '++id, especie, categoria, mesInicio, mesFim',
    zonas: '++id, nome',
    book: '++id, titulo',
    config: 'id',
    historico: '++id, variedade, dataColheita'
});

// --- LÓGICA LUNAR ---
const lunar = {
    get: () => {
        const lp = 2551443, now = new Date(), nm = new Date('1970-01-07T20:35:00Z');
        const phase = ((now.getTime() - nm.getTime()) / 1000) % lp;
        const p = Math.floor(phase / (24 * 3600)) + 1;
        if (p < 2) return { f: "Lua Nova", i: "🌑", d: "Ideal para planear e adubar." };
        if (p < 8) return { f: "Crescente", i: "🌒", d: "Semeia folhas e frutos." };
        if (p < 15) return { f: "Lua Cheia", i: "🌕", d: "Energia máxima: Colheitas!" };
        return { f: "Minguante", i: "🌘", d: "Podas e controlo de pragas." };
    }
};

// --- UI CONTROLLER ---
const ui = {
    view: 'dash',
    exp: { horta: new Set(), wiki: new Set() },

    nav: function(v, btn) {
        this.view = v;
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(`page-${v}`).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        this.render();
    },

    openModal: async function(id, prefill = null) {
        document.getElementById(id).style.display = 'flex';
        if(id === 'modal-planta') {
            const [zs, ws] = await Promise.all([db.zonas.toArray(), db.wiki.toArray()]);
            document.getElementById('p-zona').innerHTML = zs.map(z => `<option value="${z.id}">${z.nome}</option>`).join('') || '<option>Cria uma zona primeiro!</option>';
            document.getElementById('p-nome').innerHTML = ws.map(w => `<option value="${w.especie}">${w.especie}</option>`).join('') || '<option>Cria a espécie na Wiki!</option>';
            document.getElementById('p-data').valueAsDate = new Date();
            if(prefill) document.getElementById('p-nome').value = prefill;
        }
        if(id === 'modal-historico') this.drawHistorico();
    },

    closeModal: (id) => document.getElementById(id).style.display = 'none',

    render: async function() {
        const s = document.getElementById('globalSearch').value.toLowerCase();
        if(this.view === 'dash') this.drawDash();
        if(this.view === 'horta') this.drawHorta(s);
        if(this.view === 'wiki') this.drawWiki(s);
        if(this.view === 'book') this.drawBook(s);
        if(this.view === 'config') this.drawConfig();
    },

    drawDash: async function() {
        const [ps, ws, bs, cfgT] = await Promise.all([db.plantas.toArray(), db.wiki.toArray(), db.book.toArray(), db.config.get('tempMedia')]);
        const l = lunar.get();
        const tAtual = cfgT ? cfgT.val : null;
        const mes = new Date().getMonth() + 1;
        const dica = bs.length ? bs[Math.floor(Math.random()*bs.length)] : null;

        let html = `
            <div class="card card-lunar"><span>${l.i}</span><div><b>${l.f}</b><br><small>${l.d}</small></div></div>
            <div class="grid-2">
                <button class="btn-main" onclick="ui.openModal('modal-planta')">➕ Plantar</button>
                <button class="btn-main btn-sec" onclick="ui.openModal('modal-book')">📝 Nota</button>
            </div>`;

        if(dica) {
            html += `<div class="card card-note">
                <b style="font-size:0.7rem; opacity:0.6;">💡 DICA DO DIA</b>
                <div style="margin-top:5px;"><strong>${dica.titulo}</strong><p class="line-clamp">${dica.conteudo}</p>
                <span class="btn-more" onclick="logic.goToNote('${dica.titulo}')">Ler nota completa</span></div></div>`;
        }

        // --- SUGESTÕES SMART ---
        html += `<h3 style="margin:20px 0 10px 5px">📅 Sugestões de Plantio</h3>`;
        if(!tAtual) {
            html += `<div class="card" onclick="ui.nav('config', document.querySelectorAll('.nav-btn')[4])" style="text-align:center; border:2px dashed var(--p); cursor:pointer"><p>Define a temperatura nas Configurações para ver sugestões!</p></div>`;
        } else {
            const sugs = ws.filter(w => {
                const range = w.temp.match(/\d+/g);
                if(!range) return false;
                const mesOk = w.mesInicio <= w.mesFim ? (mes >= w.mesInicio && mes <= w.mesFim) : (mes >= w.mesInicio || mes <= w.mesFim);
                return mesOk && (tAtual >= parseInt(range[0]) && tAtual <= parseInt(range[1]));
            });
            if(sugs.length) {
                html += `<div class="sugestao-container">`;
                sugs.forEach(s => {
                    html += `<div class="card-sugestao" onclick="ui.openModal('modal-planta', '${s.especie}')"><span>🌱</span><b class="s-name">${s.especie}</b><small>Ideal agora</small></div>`;
                });
                html += `</div>`;
            } else { html += `<p style="opacity:0.5; font-size:0.9rem">Nada na Wiki compatível com ${tAtual}°C este mês.</p>`; }
        }

        // --- COLHEITAS PRÓXIMAS ---
        html += `<h3 style="margin:20px 0 10px 5px">🚀 Próximas Colheitas</h3>`;
        const colheitas = ps.map(p => {
            const w = ws.find(x => x.especie === p.variedade);
            if(!w) return null;
            const dias = Math.floor((new Date() - new Date(p.data))/86400000);
            return { n: p.variedade, r: w.tempo - dias };
        }).filter(x => x && x.r < 15).sort((a,b) => a.r - b.r);

        html += colheitas.map(c => `
            <div class="card" style="padding:15px; display:flex; justify-content:space-between; align-items:center; border-right: 5px solid ${c.r<=0?'var(--p)':'var(--warn)'}">
                <b>${c.n}</b><span>${c.r<=0?'✅ Pronto!':'falta '+c.r+' dias'}</span>
            </div>`).join('') || '<p style="opacity:0.5">Sem colheitas para breve.</p>';

        document.getElementById('page-dash').innerHTML = html;
    },

    drawHorta: async function(s) {
    const [ps, zs] = await Promise.all([db.plantas.toArray(), db.zonas.toArray()]);
    let html = "";
    
    zs.forEach(z => {
        const items = ps.filter(p => p.zonaId == z.id && p.variedade.toLowerCase().includes(s));
        if(items.length > 0) {
            const open = this.exp.horta.has(z.id);
            html += `
                <div style="padding:12px; background:var(--p-light); border-radius:15px; margin:10px 0; display:flex; justify-content:space-between; align-items:center; cursor:pointer" onclick="logic.toggleExp('horta',${z.id})">
                    <div style="display:flex; align-items:center; gap:10px">
                        <b>📍 ${z.nome}</b>
                        <button onclick="event.stopPropagation(); logic.regarZona(${z.id})" style="background:var(--p); color:white; border:none; border-radius:8px; padding:4px 8px; font-size:0.7rem; font-weight:bold;">💧 Regar Tudo</button>
                    </div>
                    <span>${open?'▼':'▶'}</span>
                </div>`;
            
            if(open) {
                items.forEach(p => {
                    const hRega = p.ultimaRega ? Math.floor((new Date() - new Date(p.ultimaRega))/3600000) : '?';
                    
                    let diasVida = 0;
                    if (p.data) {
                        const dataPlantio = new Date(p.data);
                        const hoje = new Date();
                        dataPlantio.setHours(0,0,0,0);
                        hoje.setHours(0,0,0,0);
                        const diffTempo = hoje.getTime() - dataPlantio.getTime();
                        diasVida = Math.floor(diffTempo / (1000 * 60 * 60 * 24));
                    }

                    html += `
                    <div class="card">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <div>
                                <b style="font-size:1.1rem">${p.variedade}</b><br>
                                <small style="color:var(--p); font-weight:bold;">💧 Rega: ${hRega}h atrás</small>
                                <span style="margin-left:8px; padding:2px 8px; background:var(--p-light); border-radius:10px; font-size:0.75rem; font-weight:bold;">📅 ${diasVida < 0 ? 0 : diasVida} dias</span>
                            </div>
                            <div style="display:flex; gap:10px">
                                <button class="btn-act" onclick="logic.regar(${p.id})">💧</button>
                                <button class="btn-act" onclick="logic.colher(${p.id})">✅</button>
                                <button class="btn-act" onclick="logic.del('plantas',${p.id})" style="color:var(--danger)">✕</button>
                            </div>
                        </div>
                        ${p.conteudo ? `<p style="margin:10px 0 0 0; font-size:0.85rem; opacity:0.8; font-style:italic; border-top:1px solid rgba(0,0,0,0.05); padding-top:8px;">📝 ${p.conteudo}</p>` : ''}
                    </div>`;
                });
            }
        }
    });
    document.getElementById('draw-horta').innerHTML = html || '<p style="text-align:center; padding:40px; opacity:0.5">Horta vazia.</p>';
},

    drawWiki: async function(s) {
    const ws = await db.wiki.toArray();
    const cats = [...new Set(ws.map(w => w.categoria))];
    document.getElementById('draw-wiki').innerHTML = cats.map(c => {
        const items = ws.filter(w => w.categoria === c && w.especie.toLowerCase().includes(s));
        if(!items.length) return "";
        const open = this.exp.wiki.has(c);
        return `<div style="padding:12px; background:var(--p-light); border-radius:15px; margin:10px 0; display:flex; justify-content:space-between; cursor:pointer" onclick="logic.toggleExp('wiki','${c}')">
            <b>📚 ${c}</b><span>${open?'▼':'▶'}</span></div>
            ${open ? items.map(i => `
                <div class="card">
                    <div style="display:flex; justify-content:space-between; align-items:center">
                        <div><b>${i.especie}</b><br><small>⏱️ ${i.tempo} dias | 🌡️ ${i.temp}°C</small></div>
                        <button class="btn-act" onclick="logic.del('wiki',${i.id})" style="color:var(--danger)">✕</button>
                    </div>
                    ${i.info ? `<div style="margin-top:10px; padding:10px; background:var(--bg); border-radius:10px; font-size:0.85rem; opacity:0.8; line-height:1.4;">📖 <b>Nota Técnica:</b><br>${i.info}</div>` : ''}
                </div>`).join('') : ''}`;
    }).join('') || '<p style="text-align:center; padding:40px; opacity:0.5">Wiki vazia.</p>';
},

    drawBook: async function(s) {
        const bs = await db.book.toArray();
        document.getElementById('draw-book').innerHTML = bs.filter(b => b.titulo.toLowerCase().includes(s)).map(b => `
            <div class="card">
                <div style="display:flex; justify-content:space-between"><b>${b.titulo}</b><button class="btn-act" onclick="logic.del('book',${b.id})" style="color:var(--danger)">✕</button></div>
                <p style="font-size:0.95rem; line-height:1.4; margin-top:10px">${b.conteudo}</p>
            </div>`).join('') || '<p style="text-align:center; padding:40px; opacity:0.5">Sem notas registadas.</p>';
    },

    drawConfig: async function() {
        const [zs, hs] = await Promise.all([db.zonas.toArray(), db.historico.toArray()]);
        document.getElementById('draw-zonas').innerHTML = zs.map(z => `<div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid rgba(0,0,0,0.05)"><span>${z.nome}</span><button onclick="logic.del('zonas',${z.id})" style="color:var(--danger); border:none; background:none">✕</button></div>`).join('');
        document.getElementById('draw-stats').innerHTML = `<div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px">
            <div class="card" style="margin:0; text-align:center"><b>${hs.length}</b><br><small>Colheitas</small></div>
            <div class="card" style="margin:0; text-align:center"><b>${zs.length}</b><br><small>Zonas</small></div>
        </div>`;
    },

    drawHistorico: async function() {
        const hs = await db.historico.reverse().toArray();
        document.getElementById('draw-historico-lista').innerHTML = hs.map(h => `<div style="padding:12px; border-bottom:1px solid rgba(0,0,0,0.05)"><b>${h.variedade}</b><br><small>Colhido em: ${h.dataColheita}</small></div>`).join('') || '<p>Ainda não colheste nada.</p>';
    }
};

// --- LOGIC CONTROLLER ---
const logic = {
    toggleExp: (t, id) => { ui.exp[t].has(id) ? ui.exp[t].delete(id) : ui.exp[t].add(id); ui.render(); },
    
    savePlantio: async function() {
    const nome = document.getElementById('p-nome').value;
    const especie = document.getElementById('p-especie').value;
    const zonaId = document.getElementById('p-zona').value;
    const data = document.getElementById('p-data').value;
    const nota = document.getElementById('p-nota').value;

    if (!especie || !zonaId || !data) {
        alert("Por favor, preenche a Espécie, Zona e Data!");
        return;
    }

    const novoRegisto = {
        variedade: nome || especie, // Se não deres nome, usa o nome da espécie
        especie: especie,
        zonaId: parseInt(zonaId),
        data: data,
        conteudo: nota,
        ultimaRega: new Date().toISOString() // Começa logo com uma rega inicial
    };

    try {
        await db.plantas.add(novoRegisto);
        ui.closeModal('modal-plantar');
        ui.render(); // Atualiza a Horta e o Dashboard
        alert("✅ Plantio registado com sucesso!");
    } catch (err) {
        console.error("Erro ao salvar:", err);
        alert("❌ Erro ao guardar o plantio.");
    }
},

    saveWiki: async function() {
    const especie = document.getElementById('w-especie').value;
    const categoria = document.getElementById('w-cat').value;
    const tempo = document.getElementById('w-tempo').value;
    const temp = document.getElementById('w-temp').value;
    const info = document.getElementById('w-info').value; // Lê a nova nota

    if (!especie) return alert("Escreve o nome da espécie!");

    const novoItem = {
        especie,
        categoria,
        tempo: parseInt(tempo) || 0,
        temp: parseInt(temp) || 0,
        info: info, // Guarda na base de dados
        // Adiciona aqui os meses se já tiveres essa lógica
    };

    try {
        await db.wiki.add(novoItem);
        ui.closeModal('modal-wiki');
        ui.render(); // Atualiza a lista da Wiki e o seletor do plantio
        alert("✅ Espécie adicionada à Wiki!");
        
        // Limpar o campo para a próxima
        document.getElementById('w-info').value = "";
    } catch (err) {
        console.error("Erro na Wiki:", err);
    }
},

    saveBook: async function() {
        const b = { titulo: document.getElementById('b-tit').value, conteudo: document.getElementById('b-txt').value };
        await db.book.add(b); ui.closeModal('modal-book'); ui.render();
    },

    openPlantar: async function() {
    // Preencher as espécies vindas da tua Wiki
    const especies = await db.wiki.toArray();
    const selectEspecie = document.getElementById('p-especie');
    selectEspecie.innerHTML = especies.map(e => `<option value="${e.especie}">${e.especie}</option>`).join('') || '<option>Adiciona espécies na Wiki primeiro!</option>';
    
    // Preencher as zonas
    const zonas = await db.zones.toArray();
    const selectZona = document.getElementById('p-zona');
    selectZona.innerHTML = zonas.map(z => `<option value="${z.id}">${z.nome}</option>`).join('');

    // Definir a data de hoje como padrão
    document.getElementById('p-data').valueAsDate = new Date();
    
    ui.openModal('modal-plantar');
},

    regar: async function(id) { await db.plantas.update(id, { ultimaRega: new Date().toISOString() }); ui.render(); },
    
    colher: async function(id) {
        if(confirm("Mover para o histórico de colheitas?")) {
            const p = await db.plantas.get(id);
            await db.historico.add({ variedade: p.variedade, dataColheita: new Date().toLocaleDateString() });
            await db.plantas.delete(id); ui.render();
        }
    },

    regarZona: async function(zonaId) {
    if(confirm("Regar todas as plantas desta zona agora?")) {
        const plantasNaZona = await db.plantas.where('zonaId').equals(zonaId).toArray();
        const agora = new Date().toISOString();
        
        // Atualiza todas em massa para performance máxima
        await Promise.all(plantasNaZona.map(p => 
            db.plantas.update(p.id, { ultimaRega: agora })
        ));
        
        ui.render();
    }
    },

    del: async function(t, id) { if(confirm("Apagar registo?")) { await db[t].delete(id); ui.render(); } },
    addZona: async function() { const v = document.getElementById('z-input').value; if(v) await db.zonas.add({ nome: v }); document.getElementById('z-input').value=""; ui.render(); },
    saveTemp: async function() { const v = parseInt(document.getElementById('cfg-temp').value); if(v) await db.config.put({ id: 'tempMedia', val: v }); ui.render(); },
    toggleTheme: async function() { document.body.classList.toggle('dark'); await db.config.put({ id: 'theme', val: document.body.classList.contains('dark') }); },
    goToNote: function(t) { document.getElementById('globalSearch').value = t; ui.nav('book', document.querySelectorAll('.nav-btn')[3]); },
    exportData: async function() { 
        const d = {}; for(const t of ['plantas','wiki','zonas','book','historico']) d[t] = await db[t].toArray();
        const blob = new Blob([JSON.stringify(d)], {type:'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `JotaGarden_Backup.json`; a.click();
    },
    importData: function(e) {
    const reader = new FileReader();
    reader.onload = async (event) => {
        try {
            const data = JSON.parse(event.target.result);
            // Limpa as tabelas antes de importar para evitar duplicados ou conflitos
            const tabelas = ['plantas', 'wiki', 'zonas', 'book', 'historico'];
            
            for (const t of tabelas) {
                if (data[t]) {
                    await db[t].clear();
                    await db[t].bulkAdd(data[t]);
                }
            }
            
            alert("✅ JotaGarden: Dados restaurados com sucesso!");
            location.reload(); // Recarrega para aplicar as mudanças
        } catch (err) {
            console.error("Erro na importação:", err);
            alert("❌ Erro: O ficheiro selecionado é inválido.");
        }
    };
    reader.readAsText(e.target.files[0]);
}
};

window.onload = async () => {
    const [t, tm] = await Promise.all([db.config.get('theme'), db.config.get('tempMedia')]);
    if(t && t.val === false) document.body.classList.remove('dark');
    if(tm) document.getElementById('cfg-temp').value = tm.val;
    ui.render();
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
};
</script>
