<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#FF6B9D">
  <meta name="description" content="Gestão de receitas HACCP, agenda e custos para pastelaria">
  
  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Doce Gestão">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png">
  
  <title>Doce Gestão - Babe's Bakery</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="app-header">
    <h1>🧁 Doce Gestão</h1>
  </header>

  <main>
    <section id="tab-dashboard" class="tab-content active" role="tabpanel" aria-labelledby="btn-dashboard"></section>
    <section id="tab-receitas" class="tab-content" role="tabpanel" aria-labelledby="btn-receitas"></section>
    <section id="tab-agenda" class="tab-content" role="tabpanel" aria-labelledby="btn-agenda"></section>
    <section id="tab-gestao" class="tab-content" role="tabpanel" aria-labelledby="btn-gestao"></section>
  </main>

  <nav class="bottom-nav" role="tablist" aria-label="Navegação principal">
    <button id="btn-dashboard" class="nav-btn active" data-target="dashboard" role="tab" aria-selected="true" aria-controls="tab-dashboard">
      <span class="ico">📊</span><span>Dashboard</span>
    </button>
    <button id="btn-receitas" class="nav-btn" data-target="receitas" role="tab" aria-selected="false" aria-controls="tab-receitas">
      <span class="ico">📖</span><span>Receitas</span>
    </button>
    <button id="btn-agenda" class="nav-btn" data-target="agenda" role="tab" aria-selected="false" aria-controls="tab-agenda">
      <span class="ico">📅</span><span>Agenda</span>
    </button>
    <button id="btn-gestao" class="nav-btn" data-target="gestao" role="tab" aria-selected="false" aria-controls="tab-gestao">
      <span class="ico">⚙️</span><span>Gestão</span>
    </button>
  </nav>

  <div id="toast" role="status" aria-live="polite" aria-atomic="true"></div>
  
  <script type="module" src="js/app.js"></script>
</body>
</html>
