<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Doce Gestão - Babe's Bakery</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

          <li><button class="nav-item" data-target="receitas">📖 Receitas</button></li>

        <section id="tab-agenda" class="tab-content"></section>
        <section id="tab-gestao" class="tab-content"></section>

    </div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-btn active" data-target="dashboard">📊 Dashboard</button>
    <button class="nav-btn" data-target="receitas">📖 Receitas</button>

  <script type="module" src="js/app.js?v=123"></script>
