<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>JotaGarden Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/dexie@4.0.8/dist/dexie.min.js"></script>
    <style>
        :root {
            --p: #2e7d32; --bg: #f5f7f5; --card: #ffffff; --txt: #2c3e50;
            --txt-rev: #ffffff; --btn-alt: #546e7a; --radius: 24px;
            --shadow: 0 8px 24px rgba(0,0,0,0.06);
        }
        body.dark {
            --bg: #121212; --card: #1e1e1e; --txt: #eceff1; --p: #81c784;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { 
            font-family: system-ui, -apple-system, sans-serif; margin: 0; 
            background: var(--bg); color: var(--txt); height: 100vh; 
            display: flex; flex-direction: column; overflow: hidden; transition: 0.3s;
        }

        header { background: var(--p); color: var(--txt-rev); padding: 20px; z-index: 10; display: flex; justify-content: space-between; }
        .search-bar { background: var(--p); padding: 0 15px 15px; border-radius: 0 0 20px 20px; }
        #globalSearch { 
            width: 100%; border: none; padding: 12px 20px; border-radius: 50px; 
            background: var(--card); color: var(--txt); font-size: 16px;
        }

        .main-content { flex: 1; overflow-y: auto; padding: 20px 15px 120px; }
        .page { display: none; }
        .page.active { display: block; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Componentes de Cards */
        .card, .card-lunar, .card-sauda, .modal-content {
            background: var(--card); color: var(--txt); border-radius: var(--radius) !important;
            padding: 20px; margin-bottom: 15px; box-shadow: var(--shadow); border: none; position: relative;
        }
        .card-lunar { background: linear-gradient(135deg, #1a2a3a, #000) !important; color: white !important; }
        .card-sauda { background: var(--p) !important; color: var(--txt-rev) !important; }

        /* Formulários */
        input, select, textarea { 
            width: 100%; padding: 14px; margin: 8px 0; border-radius: 16px; 
            border: 1px solid rgba(0,0,0,0.1); background: var(--card); color: var(--txt); font-size: 16px;
        }
        .btn-main { 
            background: var(--p); color: var(--txt-rev); border: none; padding: 16px; 
            border-radius: 18px; width: 100%; font-weight: bold; cursor: pointer;
        }
        .btn-sec { background: var(--btn-alt) !important; margin-top: 8px; }

        /* Navbar */
        .nav-bar { 
            position: fixed; bottom: 0; width: 100%; background: var(--card); 
            display: flex; padding: 10px 5px env(safe-area-inset-bottom); 
            border-top: 1px solid rgba(0,0,0,0.05); z-index: 1000; 
        }
        .nav-btn { flex: 1; border: none; background: none; color: #90a4ae; font-size: 0.7rem; cursor: pointer; }
        .nav-btn.active { color: var(--p); font-weight: bold; }
        .nav-btn i { display: block; font-size: 1.5rem; margin-bottom: 4px; }

        /* Modais */
        .modal { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); 
            z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(8px);
        }
    </style>
</head>
<body>

<header>
    <b id="view-title">JotaGarden</b>
    <span>🌿</span>
</header>

<div class="search-bar" id="search-box">
    <input type="text" id="globalSearch" placeholder="Procurar..." oninput="ui.render()">
</div>

<main class="main-content">
    <section id="page-dash" class="page active"></section>
    <section id="page-horta" class="page">
        <button class="btn-main" onclick="ui.modal('modal-planta', true)">+ Registar Plantação</button>
        <div id="draw-horta"></div>
    </section>
    <section id="page-wiki" class="page">
        <button class="btn-main" onclick="ui.modal('modal-wiki', true)">+ Nova Espécie</button>
        <div id="draw-wiki"></div>
    </section>
    <section id="page-book" class="page">
        <button class="btn-main" onclick="ui.modal('modal-book', true)">+ Nova Nota</button>
        <div id="draw-book"></div>
    </section>
    <section id="page-config" class="page">
        <div class="card">
            <h3>🌓 Personalização</h3>
            <button class="btn-main btn-sec" onclick="logic.toggleTheme()">Alternar Tema</button>
            <hr style="opacity:0.1; margin:20px 0;">
            <h3>📍 Gerir Zonas</h3>
            <div style="display:flex; gap:8px;">
                <input type="text" id="z-input" placeholder="Ex: Estufa">
                <button class="btn-main" style="width:80px" onclick="logic.addZona()">OK</button>
            </div>
            <div id="draw-zonas" style="margin-top:15px"></div>
            <hr style="opacity:0.1; margin:20px 0;">
            <button class="btn-main" style="background:#fb8c00" onclick="logic.export()">📥 Backup (Exportar)</button>
            <button class="btn-main btn-sec" onclick="document.getElementById('fileIn').click()">📤 Backup (Importar)</button>
            <input type="file" id="fileIn" style="display:none" onchange="logic.import(event)">
        </div>
    </section>
</main>

<div id="modal-planta" class="modal">
    <div class="modal-content">
        <h3>🌱 Nova Planta</h3>
        <select id="p-nome">
            <option value="">Selecionar da Wiki...</option>
        </select>
        <input type="date" id="p-data">
        <select id="p-zona"></select>
        <textarea id="p-nota" placeholder="Observações..."></textarea>
        <button class="btn-main" onclick="logic.savePlanta()">Confirmar</button>
        <button class="btn-main btn-sec" onclick="ui.modal('modal-planta', false)">Cancelar</button>
    </div>
</div>

<div id="modal-wiki" class="modal">
    <div class="modal-content">
        <h3>📖 Nova Espécie</h3>
        <input type="text" id="w-nome" placeholder="Ex: Tomate Rosa">
        <input type="number" id="w-dias" placeholder="Dias até colher">
        <input type="text" id="w-temp" placeholder="Temp. Ideal (ex: 20-30°C)">
        <textarea id="w-info" placeholder="Rega, Sol, Adubação..."></textarea>
        <button class="btn-main" onclick="logic.saveWiki()">Guardar</button>
        <button class="btn-main btn-sec" onclick="ui.modal('modal-wiki', false)">Cancelar</button>
    </div>
</div>

<div id="modal-book" class="modal">
    <div class="modal-content">
        <h3>📒 Nova Nota</h3>
        <input type="text" id="b-tit" placeholder="Título da dica">
        <select id="b-cat">
            <option>💡 Dicas</option><option>🪄 Truques</option><option>🐛 Pragas</option><option>📝 Geral</option>
        </select>
        <textarea id="b-txt" placeholder="Conteúdo..."></textarea>
        <button class="btn-main" onclick="logic.saveBook()">Guardar</button>
        <button class="btn-main btn-sec" onclick="ui.modal('modal-book', false)">Sair</button>
    </div>
</div>

<nav class="nav-bar">
    <button class="nav-btn active" onclick="ui.nav('dash', this)"><i>🏠</i>Início</button>
    <button class="nav-btn" onclick="ui.nav('horta', this)"><i>🌱</i>Horta</button>
    <button class="nav-btn" onclick="ui.nav('wiki', this)"><i>📖</i>Wiki</button>
    <button class="nav-btn" onclick="ui.nav('book', this)"><i>📒</i>Book</button>
    <button class="nav-btn" onclick="ui.nav('config', this)"><i>⚙️</i>Config</button>
</nav>

<script src="db.js"></script>
<script src="app.js"></script>
</body>
</html>
